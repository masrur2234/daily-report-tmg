  <rect x="27" y="28" width="5" height="24" fill="#ffffff" rx="1"/>
  <rect x="40" y="28" width="5" height="24" fill="#ffffff" rx="1"/>
  <rect x="53" y="28" width="5" height="24" fill="#ffffff" rx="1"/>
